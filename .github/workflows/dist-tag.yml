name: dist-tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to point the dist-tag at (e.g. 0.1.0-beta.2).
        required: true
        type: string
      tag:
        description: Dist-tag to set or move (e.g. latest, beta, next).
        required: true
        type: string
        default: latest

permissions:
  contents: read

jobs:
  dist-tag:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
      - name: Move dist-tag
        run: |
          npm dist-tag add "homebridge-omnilogic-pool@${{ inputs.version }}" "${{ inputs.tag }}"
          echo "Current dist-tags:"
          npm view homebridge-omnilogic-pool dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
