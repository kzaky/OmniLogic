name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run npm publish in --dry-run mode (no upload).
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Verify package.json version matches tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF##*/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG)" >&2
            exit 1
          fi
      - name: Resolve dist-tag
        id: disttag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: npm publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: npm publish --access public --tag ${{ steps.disttag.outputs.tag }} --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: npm publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false)
        run: npm publish --access public --tag ${{ steps.disttag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Also move latest on pre-1.0 betas
        if: |
          (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false))
          && steps.disttag.outputs.tag == 'beta'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == 0.* ]]; then
            npm dist-tag add "homebridge-omnilogic-pool@$VERSION" latest
            echo "latest now points at $VERSION"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # Extract the CHANGELOG section for this version, if present.
          NOTES_FILE=$(mktemp)
          awk -v ver="## [$VERSION]" '
            $0 ~ "^## \\[" {
              if (in_section) exit
              if (index($0, ver) == 1) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release $VERSION" > "$NOTES_FILE"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            $PRERELEASE_FLAG
